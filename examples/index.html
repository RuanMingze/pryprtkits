<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PryprtKits - 使用示例</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #ffa705 0%, #ecfd00 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 18px;
      opacity: 0.9;
    }
    
    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .example-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .example-card h3 {
      color: #d4ad00;
      margin-bottom: 16px;
      font-size: 20px;
    }
    
    .example-card h4 {
      color: #333;
      margin: 16px 0 8px;
      font-size: 16px;
    }
    
    .example-card pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    
    .example-card code {
      font-family: 'Consolas', 'Monaco', monospace;
      color: #333;
    }
    
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    
    .btn:hover {
      background: #5568d3;
    }
    
    .result {
      margin-top: 12px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 6px;
      border-left: 3px solid #22c55e;
      font-size: 13px;
      word-break: break-all;
    }
    
    .input-group {
      margin-bottom: 12px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 4px;
      color: #555;
      font-size: 13px;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .input-group textarea {
      resize: vertical;
      min-height: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PryprtKits</h1>
      <p>前端通用工具箱库 - 150+ 实用工具函数</p>
    </div>
    
    <div class="examples">
      <!-- 加密解密示例 -->
      <div class="example-card">
        <h3><i class="fas fa-key"></i> AES 加密解密</h3>
        <div class="input-group">
          <label>原始文本</label>
          <input type="text" id="aesInput" value="Hello, PryprtKits!">
        </div>
        <div class="input-group">
          <label>密钥</label>
          <input type="text" id="aesKey" value="mySecretKey123456">
        </div>
        <button class="btn" onclick="testAesEncrypt()">加密</button>
        <button class="btn" onclick="testAesDecrypt()">解密</button>
        <div class="result" id="aesResult">结果将显示在这里</div>
      </div>
      
      <!-- MD5 哈希示例 -->
      <div class="example-card">
        <h3><i class="fas fa-lock"></i> MD5 哈希计算</h3>
        <div class="input-group">
          <label>输入文本</label>
          <input type="text" id="md5Input" value="Hello World">
        </div>
        <button class="btn" onclick="testMd5()">计算 MD5</button>
        <div class="result" id="md5Result">结果将显示在这里</div>
      </div>
      
      <!-- SHA256 哈希示例 -->
      <div class="example-card">
        <h3><i class="fas fa-lock"></i> SHA256 哈希计算</h3>
        <div class="input-group">
          <label>输入文本</label>
          <input type="text" id="sha256Input" value="Hello World">
        </div>
        <button class="btn" onclick="testSha256()">计算 SHA256</button>
        <div class="result" id="sha256Result">结果将显示在这里</div>
      </div>
      
      <!-- Base64 转换示例 -->
      <div class="example-card">
        <h3><i class="fas fa-rotate"></i> Base64 编码解码</h3>
        <div class="input-group">
          <label>输入文本</label>
          <input type="text" id="base64Input" value="Hello, PryprtKits!">
        </div>
        <button class="btn" onclick="testBase64Encode()">编码</button>
        <button class="btn" onclick="testBase64Decode()">解码</button>
        <div class="result" id="base64Result">结果将显示在这里</div>
      </div>
      
      <!-- JSON 转 YAML 示例 -->
      <div class="example-card">
        <h3><i class="fas fa-file"></i> JSON 转 YAML</h3>
        <div class="input-group">
          <label>JSON 数据</label>
          <textarea id="jsonInput">{"name": "PryprtKits", "version": "1.0.0"}</textarea>
        </div>
        <button class="btn" onclick="testJsonToYaml()">转换</button>
        <div class="result" id="yamlResult">结果将显示在这里</div>
      </div>
      
      <!-- Markdown 转 HTML 示例 -->
      <div class="example-card">
        <h3><i class="fas fa-file"></i> Markdown 转 HTML</h3>
        <div class="input-group">
          <label>Markdown</label>
          <textarea id="markdownInput"># Hello
**Bold** and *italic*
- Item 1
- Item 2</textarea>
        </div>
        <button class="btn" onclick="testMarkdownToHtml()">转换</button>
        <div class="result" id="htmlResult" style="background: #fff; border: 1px solid #ddd;"></div>
      </div>
      
      <!-- 密码生成示例 -->
      <div class="example-card">
        <h3><i class="fas fa-key"></i> 生成随机密码</h3>
        <div class="input-group">
          <label>密码长度</label>
          <input type="number" id="passwordLength" value="16" min="8" max="64">
        </div>
        <button class="btn" onclick="testGeneratePassword()">生成密码</button>
        <div class="result" id="passwordResult">结果将显示在这里</div>
      </div>
      
      <!-- 密码强度检测示例 -->
      <div class="example-card">
        <h3><i class="fas fa-chart-bar"></i> 密码强度检测</h3>
        <div class="input-group">
          <label>输入密码</label>
          <input type="text" id="passwordCheckInput" value="MyStr0ngP@ss!">
        </div>
        <button class="btn" onclick="testPasswordStrength()">检测</button>
        <div class="result" id="strengthResult">结果将显示在这里</div>
      </div>
      
      <!-- 图片压缩示例 -->
      <div class="example-card">
        <h3><i class="fas fa-image"></i> 图片压缩</h3>
        <div class="input-group">
          <label>选择图片</label>
          <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="input-group">
          <label>质量 (0-1)</label>
          <input type="number" id="qualityInput" value="0.7" min="0.1" max="1" step="0.1">
        </div>
        <button class="btn" onclick="testCompressImage()">压缩</button>
        <div class="result" id="imageResult">结果将显示在这里</div>
      </div>
      
      <!-- 二维码生成示例 -->
      <div class="example-card">
        <h3><i class="fas fa-qrcode"></i> 生成二维码</h3>
        <div class="input-group">
          <label>文本内容</label>
          <input type="text" id="qrInput" value="https://github.com/RuanMingze/pryprtkits">
        </div>
        <button class="btn" onclick="testGenerateQRCode()">生成二维码</button>
        <div class="result" id="qrResult"></div>
      </div>
      
      <!-- URL 编码示例 -->
      <div class="example-card">
        <h3><i class="fas fa-globe"></i> URL 编码解码</h3>
        <div class="input-group">
          <label>输入文本</label>
          <input type="text" id="urlInput" value="Hello 世界!">
        </div>
        <button class="btn" onclick="testUrlEncode()">编码</button>
        <button class="btn" onclick="testUrlDecode()">解码</button>
        <div class="result" id="urlResult">结果将显示在这里</div>
      </div>
      
      <!-- 时间戳转换示例 -->
      <div class="example-card">
        <h3><i class="fas fa-clock"></i> 时间戳转换</h3>
        <div class="input-group">
          <label>时间戳</label>
          <input type="number" id="timestampInput" value="1700000000000">
        </div>
        <button class="btn" onclick="testTimestampToDate()">转换</button>
        <div class="result" id="dateResult">结果将显示在这里</div>
      </div>
    </div>
  </div>
  
  <script src="../dist/pryprtkits.js"></script>
  <script>
    const { convert, encrypt, image } = PryprtKits;
    
    // AES 加密
    function testAesEncrypt() {
      try {
        const text = document.getElementById('aesInput').value;
        const key = document.getElementById('aesKey').value;
        const encrypted = encrypt.aesEncrypt(text, key);
        document.getElementById('aesResult').textContent = '加密结果：' + encrypted;
      } catch (e) {
        document.getElementById('aesResult').textContent = '错误：' + e.message;
      }
    }
    
    // AES 解密
    function testAesDecrypt() {
      try {
        const text = document.getElementById('aesInput').value;
        const key = document.getElementById('aesKey').value;
        const encrypted = encrypt.aesEncrypt(text, key);
        const decrypted = encrypt.aesDecrypt(encrypted, key);
        document.getElementById('aesResult').textContent = '解密结果：' + decrypted;
      } catch (e) {
        document.getElementById('aesResult').textContent = '错误：' + e.message;
      }
    }
    
    // MD5
    function testMd5() {
      try {
        const text = document.getElementById('md5Input').value;
        const result = encrypt.md5(text);
        document.getElementById('md5Result').textContent = 'MD5: ' + result;
      } catch (e) {
        document.getElementById('md5Result').textContent = '错误：' + e.message;
      }
    }
    
    // SHA256
    function testSha256() {
      try {
        const text = document.getElementById('sha256Input').value;
        const result = encrypt.sha256(text);
        document.getElementById('sha256Result').textContent = 'SHA256: ' + result;
      } catch (e) {
        document.getElementById('sha256Result').textContent = '错误：' + e.message;
      }
    }
    
    // Base64 编码
    function testBase64Encode() {
      try {
        const text = document.getElementById('base64Input').value;
        const result = convert.textToBase64(text);
        document.getElementById('base64Result').textContent = 'Base64: ' + result;
      } catch (e) {
        document.getElementById('base64Result').textContent = '错误：' + e.message;
      }
    }
    
    // Base64 解码
    function testBase64Decode() {
      try {
        const text = document.getElementById('base64Input').value;
        const result = convert.base64ToText(text);
        document.getElementById('base64Result').textContent = '解码：' + result;
      } catch (e) {
        document.getElementById('base64Result').textContent = '错误：' + e.message;
      }
    }
    
    // JSON 转 YAML
    function testJsonToYaml() {
      try {
        const json = JSON.parse(document.getElementById('jsonInput').value);
        const result = convert.jsonToYaml(json);
        document.getElementById('yamlResult').textContent = result;
      } catch (e) {
        document.getElementById('yamlResult').textContent = '错误：' + e.message;
      }
    }
    
    // Markdown 转 HTML
    function testMarkdownToHtml() {
      try {
        const markdown = document.getElementById('markdownInput').value;
        const result = convert.markdownToHtml(markdown);
        document.getElementById('htmlResult').innerHTML = result;
      } catch (e) {
        document.getElementById('htmlResult').textContent = '错误：' + e.message;
      }
    }
    
    // 生成密码
    function testGeneratePassword() {
      try {
        const length = parseInt(document.getElementById('passwordLength').value);
        const result = encrypt.generatePassword(length);
        document.getElementById('passwordResult').textContent = '生成密码：' + result;
      } catch (e) {
        document.getElementById('passwordResult').textContent = '错误：' + e.message;
      }
    }
    
    // 密码强度检测
    function testPasswordStrength() {
      try {
        const password = document.getElementById('passwordCheckInput').value;
        const result = encrypt.checkPasswordStrength(password);
        document.getElementById('strengthResult').innerHTML = 
          '强度：<strong>' + result.level + '</strong><br>' + 
          '分数：' + result.score + '/7<br>' +
          '建议：' + result.feedback.join('<br>');
      } catch (e) {
        document.getElementById('strengthResult').textContent = '错误：' + e.message;
      }
    }
    
    // 图片压缩
    async function testCompressImage() {
      try {
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        if (!file) {
          document.getElementById('imageResult').textContent = '请先选择图片';
          return;
        }
        
        const quality = parseFloat(document.getElementById('qualityInput').value);
        const blob = await image.compressImage(file, quality);
        
        const sizeBefore = (file.size / 1024).toFixed(2);
        const sizeAfter = (blob.size / 1024).toFixed(2);
        const percent = ((blob.size / file.size) * 100).toFixed(1);
        
        document.getElementById('imageResult').innerHTML = 
          '压缩前：' + sizeBefore + ' KB<br>' +
          '压缩后：' + sizeAfter + ' KB<br>' +
          '压缩率：' + percent + '%';
      } catch (e) {
        document.getElementById('imageResult').textContent = '错误：' + e.message;
      }
    }
    
    // 生成二维码
    async function testGenerateQRCode() {
      try {
        const text = document.getElementById('qrInput').value;
        const canvas = await image.generateQRCode(text);
        const qrResult = document.getElementById('qrResult');
        qrResult.innerHTML = '';
        qrResult.appendChild(canvas);
      } catch (e) {
        document.getElementById('qrResult').textContent = '错误：' + e.message;
      }
    }
    
    // URL 编码
    function testUrlEncode() {
      try {
        const text = document.getElementById('urlInput').value;
        const result = convert.urlEncode(text);
        document.getElementById('urlResult').textContent = '编码：' + result;
      } catch (e) {
        document.getElementById('urlResult').textContent = '错误：' + e.message;
      }
    }
    
    // URL 解码
    function testUrlDecode() {
      try {
        const text = document.getElementById('urlInput').value;
        const result = convert.urlDecode(text);
        document.getElementById('urlResult').textContent = '解码：' + result;
      } catch (e) {
        document.getElementById('urlResult').textContent = '错误：' + e.message;
      }
    }
    
    // 时间戳转日期
    function testTimestampToDate() {
      try {
        const timestamp = parseInt(document.getElementById('timestampInput').value);
        const result = convert.timestampToDate(timestamp);
        document.getElementById('dateResult').textContent = '日期：' + result;
      } catch (e) {
        document.getElementById('dateResult').textContent = '错误：' + e.message;
      }
    }
  </script>
</body>
</html>
